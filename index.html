<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Watchlist">
<title>Watchlist</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#fff;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0}
.header{padding:16px;background:#1c1c1e;position:sticky;top:0;z-index:10;border-bottom:1px solid #38383a}
.header h1{font-size:34px;font-weight:700;margin-bottom:12px}
.search-wrap{display:flex;gap:8px}
#search{flex:1;padding:10px 12px;font-size:17px;border:none;border-radius:10px;background:#2c2c2e;color:#fff;outline:none}
#addBtn{padding:10px 16px;font-size:17px;font-weight:600;border:none;border-radius:10px;background:#0A84FF;color:#fff}
#addBtn:active{opacity:0.6}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:118px;background:#000;z-index:5}
th{text-align:left;padding:8px 16px;font-size:13px;font-weight:600;color:#8e8e93;border-bottom:1px solid #38383a}
tbody tr{border-bottom:1px solid #38383a;position:relative;overflow:hidden}
td{padding:12px 16px;font-size:17px;white-space:nowrap}
.ticker{font-weight:600}
.price{text-align:right}
.change{text-align:right;font-weight:600}
.up{color:#30d158}
.down{color:#ff453a}
.neutral{color:#8e8e93}
.high,.low{text-align:right;color:#8e8e93;font-size:15px}
.row-content{background:#000;display:flex;transition:transform 0.3s ease;position:relative;z-index:2}
.row-content.swiped{transform:translateX(-80px)}
.delete-btn{position:absolute;right:0;top:0;bottom:0;width:80px;background:#ff453a;color:#fff;border:none;font-size:17px;font-weight:600;z-index:1}
.empty{text-align:center;padding:60px 20px;color:#8e8e93;font-size:17px}
.loading{color:#8e8e93}
</style>
</head>
<body>
<div class="header">
<h1>Watchlist</h1>
<div class="search-wrap">
<input id="search" type="text" placeholder="Add Ticker" autocapitalize="characters" autocomplete="off">
<button id="addBtn">Add</button>
</div>
</div>
<table>
<thead><tr><th>Ticker</th><th style="text-align:right">Price</th><th style="text-align:right">Today</th><th style="text-align:right">52W High</th><th style="text-align:right">52W Low</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
<script>
const API_KEY='d7j9m1pr01qp3g1scckgd7j9m1pr01qp3g1sccl0';
const REFRESH_SEC=15;
const STORAGE_KEY='watchlist_tickers_v3';
let tickers=JSON.parse(localStorage.getItem(STORAGE_KEY)||'["AAPL","SPY","MSFT"]');
let touchStartX=0;let currentSwipe=null;
const tbody=document.getElementById('tbody');
const search=document.getElementById('search');
const addBtn=document.getElementById('addBtn');
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(tickers))}
function formatNum(n){if(n===null||n===undefined)return'-';return n>=1000?n.toLocaleString('en-US',{maximumFractionDigits:2}):n.toFixed(2)}
function formatPct(n){if(n===null||n===undefined)return'-';const sign=n>0?'+':'';return sign+n.toFixed(2)+'%'}
async function fetchData(symbol){
try{
const[quote,metric]=await Promise.all([
fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`).then(r=>r.json()),
fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${symbol}&metric=all&token=${API_KEY}`).then(r=>r.json())
]);
return{symbol,price:quote.c,change:quote.dp,high52:metric.metric?.['52WeekHigh']||null,low52:metric.metric?.['52WeekLow']||null}
}catch(e){return{symbol,price:null,change:null,high52:null,low52:null}}
}
function renderRow(d){
const cls=d.change>0?'up':d.change<0?'down':'neutral';
return`<tr data-ticker="${d.symbol}"><td colspan="5" style="padding:0;position:relative;"><button class="delete-btn" onclick="removeTicker('${d.symbol}')">Delete</button><div class="row-content" ontouchstart="touchStart(event)" ontouchmove="touchMove(event)" ontouchend="touchEnd(event)"><table style="width:100%;border-collapse:collapse;"><tr><td class="ticker">${d.symbol}</td><td class="price ${d.price?'':'loading'}">${d.price?'$'+formatNum(d.price):'...'}</td><td class="change ${cls}">${formatPct(d.change)}</td><td class="high">${d.high52?'$'+formatNum(d.high52):'-'}</td><td class="low">${d.low52?'$'+formatNum(d.low52):'-'}</td></tr></table></div></td></tr>`
}
async function refresh(){
if(!tickers.length){tbody.innerHTML='<tr><td colspan="5" class="empty">Add a ticker to start</td></tr>';return}
const data=await Promise.all(tickers.map(fetchData));
tbody.innerHTML=data.map(renderRow).join('')
}
function addTicker(){
const sym=search.value.trim().toUpperCase();
if(!sym)return;
if(tickers.includes(sym)){search.value='';return}
tickers.push(sym);save();search.value='';refresh()
}
function removeTicker(sym){
tickers=tickers.filter(t=>t!==sym);save();refresh()
}
function touchStart(e){
if(currentSwipe&&currentSwipe!==e.currentTarget){currentSwipe.classList.remove('swiped')}
touchStartX=e.touches[0].clientX;currentSwipe=e.currentTarget
}
function touchMove(e){
if(!currentSwipe)return;
const diff=touchStartX-e.touches[0].clientX;
if(diff>50){currentSwipe.classList.add('swiped')}
else if(diff<-20){currentSwipe.classList.remove('swiped')}
}
function touchEnd(e){touchStartX=0}
document.addEventListener('click',(e)=>{
if(currentSwipe&&!currentSwipe.contains(e.target)){currentSwipe.classList.remove('swiped');currentSwipe=null}
});
addBtn.onclick=addTicker;
search.onkeydown=e=>{if(e.key==='Enter')addTicker()};
refresh();
setInterval(refresh,REFRESH_SEC*1000);
</script>
</body>
</html>
